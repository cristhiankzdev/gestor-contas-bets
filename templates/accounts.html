<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestor de Contas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="{{ url_for('static', filename='accounts.css') }}" rel="stylesheet" />
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar px-3 py-2">
  <div class="d-flex align-items-center gap-3">
    <span class="navbar-brand mb-0 fw-bold fs-5">
      <i class="bi bi-people-fill text-success me-1"></i>
      Gestor de Contas
    </span>
    <span class="badge bg-secondary" id="badge-count">—</span>
    <a href="/nova-operacao" class="btn btn-sm btn-outline-primary ms-2" title="Nova Operação">
      <i class="bi bi-calculator-fill"></i> Nova Operação
    </a>
    <span class="today-date" id="today-date">—</span>
  </div>
  <div class="d-flex align-items-center gap-2">
    <button class="btn btn-sm btn-outline-secondary" id="btn-open-settings" title="Configurações">
      <i class="bi bi-gear"></i>
    </button>
    <a href="/logout" class="btn btn-sm btn-outline-secondary" title="Sair">
      <i class="bi bi-box-arrow-right"></i>
    </a>
  </div>
</nav>

<!-- MODAL: Configurações -->
<div class="modal fade" id="modal-settings" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-gear me-2"></i>Configurações</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p class="text-muted small fw-semibold text-uppercase mb-2" style="letter-spacing:.06em">Opções</p>
        <div class="d-flex flex-column gap-3">
          <button type="button" class="btn btn-outline-secondary" id="btn-settings-criar-conta">
            <i class="bi bi-person-plus me-2"></i>Criar Conta
          </button>
          <a href="/historico" class="btn btn-outline-secondary">
            <i class="bi bi-clock-history me-2"></i>Histórico
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main-wrap">

  <div id="loading" class="text-center py-5">
    <div class="spinner-border text-success" role="status"></div>
  </div>

  <div id="empty-state" class="text-center py-5 d-none">
    <i class="bi bi-people fs-1 text-muted"></i>
    <p class="mt-3 text-muted">Nenhuma conta cadastrada.</p>
    <button class="btn btn-success" id="btn-add-empty">
      <i class="bi bi-plus-lg me-1"></i> Adicionar primeira conta
    </button>
  </div>

  <div id="accounts-table-wrap" class="d-none">
    <table class="accounts-table" id="accounts-table">
      <thead>
        <tr id="accounts-thead-row"></tr>
      </thead>
      <tbody id="accounts-tbody"></tbody>
    </table>
  </div>

  <!-- Operações do dia (abaixo da tabela) -->
  <div id="operations-section" class="d-none mt-4">
    <div class="op-section-header">
      <i class="bi bi-lightning-charge-fill me-1"></i>
      <span>Operações do dia</span>
    </div>
    <div id="operations-list" class="op-rows-list"></div>
  </div>

</div>

<!-- MODAL: Editar conta -->
<div class="modal fade" id="modal-account" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modal-account-title">Editar Conta</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label fw-semibold">Nome da conta</label>
          <input type="text" class="form-control" id="edit-name" placeholder="Ex: Mac, Gue, Fer..." />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Status</label>
          <div class="d-flex gap-2">
            <button type="button" class="btn btn-status flex-fill" id="btn-status-normal">Normal</button>
            <button type="button" class="btn btn-status flex-fill gold" id="btn-status-gold">Gold</button>
            <button type="button" class="btn btn-status flex-fill bolsa" id="btn-status-bolsa">Bolsa</button>
          </div>
        </div>
        <div class="row g-2 mb-1">
          <div class="col-6">
            <label class="form-label fw-semibold small mb-1">Freebet</label>
            <div class="input-group input-group-sm">
              <span class="input-group-text">R$</span>
              <input type="number" class="form-control" id="edit-freebet" placeholder="—" min="0" step="0.01" />
              <button class="btn btn-outline-secondary" id="btn-clear-edit-freebet" type="button" title="Limpar freebet">
                <i class="bi bi-x"></i>
              </button>
            </div>
          </div>
          <div class="col-6">
            <label class="form-label fw-semibold small mb-1">Saldo</label>
            <div class="input-group input-group-sm">
              <span class="input-group-text">R$</span>
              <input type="number" class="form-control" id="edit-saldo" placeholder="—" step="0.01" />
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-danger me-auto" id="btn-delete-account">
          <i class="bi bi-trash"></i> Excluir conta
        </button>
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-success" id="btn-save-account">Salvar</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: Gerir contas -->
<div class="modal fade" id="modal-manage" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-people-fill text-success me-2"></i>Gerir Contas</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-0">
        <div id="manage-accounts-list"></div>
        <div class="manage-add-row">
          <input type="text" class="form-control form-control-sm" id="new-account-name"
            placeholder="Nome da nova conta..." maxlength="40" />
          <button class="btn btn-sm btn-success flex-shrink-0" id="btn-add-new-account">
            <i class="bi bi-plus-lg"></i> Adicionar
          </button>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='accounts.js') }}"></script>
</body>
</html>
