<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Histórico — Gestor de Contas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="{{ url_for('static', filename='accounts.css') }}" rel="stylesheet" />
  <link href="{{ url_for('static', filename='history.css') }}" rel="stylesheet" />
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar px-3 py-2">
  <div class="d-flex align-items-center gap-3">
    <a href="/" class="navbar-brand mb-0 fw-bold fs-5 text-decoration-none">
      <i class="bi bi-people-fill text-success me-1"></i>
      Gestor de Contas
    </a>
    <a href="/historico" class="btn btn-sm btn-outline-primary active">
      <i class="bi bi-clock-history"></i> Histórico
    </a>
  </div>
  <div class="d-flex align-items-center gap-2">
    <div class="btn-group btn-group-sm" id="nav-menu">
      <button class="btn btn-sm btn-outline-secondary" id="btn-settings-dropdown" type="button" data-bs-toggle="dropdown" aria-expanded="false" title="Configurações">
        <i class="bi bi-gear"></i>
      </button>
      <ul class="dropdown-menu">
        <li><a class="dropdown-item" href="/"><i class="bi bi-people-fill me-2"></i>Gerir Contas</a></li>
        <li><a class="dropdown-item" href="/historico"><i class="bi bi-clock-history me-2"></i>Histórico</a></li>
        <li><hr class="dropdown-divider"></li>
        <li><a class="dropdown-item" href="/" data-bs-toggle="modal" data-bs-target="#modal-colors"><i class="bi bi-palette-fill me-2"></i>Cores dos Pares</a></li>
      </ul>
    </div>
    <a href="/logout" class="btn btn-sm btn-outline-secondary" title="Sair">
      <i class="bi bi-box-arrow-right"></i>
    </a>
  </div>
</nav>

<!-- MAIN -->
<div class="main-wrap">

  <!-- Dashboard cards -->
  <div class="hist-dashboard mb-4" id="hist-dashboard" style="display:none">
    <div class="hist-card">
      <div class="hist-card-label">Dias registrados</div>
      <div class="hist-card-value" id="hd-days">—</div>
    </div>
    <div class="hist-card">
      <div class="hist-card-label">Total de operações</div>
      <div class="hist-card-value" id="hd-ops">—</div>
    </div>
    <div class="hist-card">
      <div class="hist-card-label">Total investido</div>
      <div class="hist-card-value" id="hd-stake">—</div>
    </div>
    <div class="hist-card">
      <div class="hist-card-label">Lucro / Prejuízo total</div>
      <div class="hist-card-value" id="hd-profit">—</div>
    </div>
  </div>

  <!-- Filters -->
  <div class="d-flex align-items-center gap-3 mb-3 flex-wrap">
    <div class="d-flex align-items-center gap-2">
      <label class="form-label mb-0 text-muted small fw-semibold">De</label>
      <input type="date" class="form-control form-control-sm" id="filter-from" style="width:140px" />
    </div>
    <div class="d-flex align-items-center gap-2">
      <label class="form-label mb-0 text-muted small fw-semibold">Até</label>
      <input type="date" class="form-control form-control-sm" id="filter-to" style="width:140px" />
    </div>
    <button class="btn btn-sm btn-primary" id="btn-filter-apply">
      <i class="bi bi-funnel me-1"></i>Filtrar
    </button>
    <button class="btn btn-sm btn-outline-secondary" id="btn-filter-clear">
      <i class="bi bi-x-circle me-1"></i>Limpar
    </button>
    <div class="btn-group btn-group-sm ms-auto">
      <button class="btn btn-sm btn-outline-danger" id="btn-clear-archived">
        <i class="bi bi-trash me-1"></i>Limpar arquivadas
      </button>
    </div>
    <a href="/" class="btn btn-sm btn-outline-secondary ms-auto">
      <i class="bi bi-arrow-left me-1"></i>Voltar
    </a>
  </div>

  <!-- Loading -->
  <div id="hist-loading" class="text-center py-5">
    <div class="spinner-border text-secondary" role="status"></div>
  </div>

  <!-- Empty -->
  <div id="hist-empty" class="text-center py-5 d-none">
    <i class="bi bi-inbox fs-1 text-muted"></i>
    <p class="mt-3 text-muted">Nenhuma operação encontrada no histórico.</p>
  </div>

  <!-- Days list -->
  <div id="hist-list"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='history.js') }}"></script>
</body>
</html>
