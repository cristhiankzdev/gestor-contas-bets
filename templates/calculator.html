<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Operação</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="{{ url_for('static', filename='calculator.css') }}" rel="stylesheet" />
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar px-3 py-2">
  <div class="d-flex align-items-center gap-3">
    <a href="/" class="navbar-brand mb-0 fw-bold fs-5 text-decoration-none">
      <i class="bi bi-people-fill text-success me-1"></i>
      Gestor de Contas
    </a>
    <span class="badge bg-secondary">0</span>
    <a href="/nova-operacao" class="btn btn-sm btn-outline-primary ms-2 active">
      <i class="bi bi-calculator-fill"></i> Nova Operação
    </a>
  </div>
  <div class="d-flex align-items-center gap-2">
    <div class="btn-group btn-group-sm" id="nav-menu">
      <button class="btn btn-sm btn-outline-secondary" id="btn-settings-dropdown" type="button" data-bs-toggle="dropdown" aria-expanded="false" title="Configurações">
        <i class="bi bi-gear"></i>
      </button>
      <ul class="dropdown-menu">
        <li><a class="dropdown-item" href="/"><i class="bi bi-people-fill me-2"></i>Gerir Contas</a></li>
        <li><a class="dropdown-item" href="/historico"><i class="bi bi-clock-history me-2"></i>Histórico</a></li>
        <li><hr class="dropdown-divider"></li>
        <li><a class="dropdown-item" data-bs-toggle="modal" data-bs-target="#modal-colors"><i class="bi bi-palette-fill me-2"></i>Cores dos Pares</a></li>
      </ul>
    </div>
    <a href="/logout" class="btn btn-sm btn-outline-secondary" title="Sair">
      <i class="bi bi-box-arrow-right"></i>
    </a>
  </div>
</nav>

<!-- MAIN -->
<div class="calc-wrap">

  <div class="d-flex align-items-start justify-content-between mb-3 flex-wrap gap-2">
    <div>
      <h5 class="fw-bold mb-0">Operações</h5>
      <small class="text-muted">Back e Lay — distribua stakes para lucro garantido</small>
    </div>
    <div id="surebet-indicator">
      <span class="badge bg-secondary px-3 py-2">—</span>
    </div>
  </div>

  <!-- Controls -->
  <div class="d-flex align-items-center gap-3 mb-3 flex-wrap">
    <div class="d-flex align-items-center gap-2">
      <span class="text-muted small fw-semibold">Apostas:</span>
      <div class="btn-group btn-group-sm" id="bet-count-btns">
        <button class="btn btn-outline-secondary active" data-n="2">2</button>
        <button class="btn btn-outline-secondary" data-n="3">3</button>
        <button class="btn btn-outline-secondary" data-n="4">4</button>
        <button class="btn btn-outline-secondary" data-n="5">5</button>
      </div>
    </div>
    <div class="form-check form-switch mb-0 ms-auto">
      <input class="form-check-input" type="checkbox" id="round-toggle" checked />
      <label class="form-check-label text-muted small" for="round-toggle">
        Arredondar (sem centavos)
      </label>
    </div>
  </div>

  <!-- Op name -->
  <div class="d-flex align-items-center gap-3 mb-3 flex-wrap">
    <div style="flex:1; min-width:200px; max-width:320px">
      <input type="text" class="form-control form-control-sm" id="calc-op-name"
             placeholder="Nome da operação (ex: Aumento 25%)"
             list="calc-op-name-suggestions" autocomplete="off" />
      <datalist id="calc-op-name-suggestions"></datalist>
    </div>
    <span class="text-muted small" id="calc-op-name-hint"></span>
  </div>

  <!-- Table card -->
  <div class="card shadow-sm mb-3">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table calc-table mb-0">
          <thead class="table-light">
            <tr>
              <th class="ps-2 col-num">Aposta</th>
              <th class="col-odd">Odd</th>
              <th class="col-comm">Comissão</th>
              <th class="col-stake">Stake</th>
              <th class="col-liab">Responsabilidade</th>
              <th class="col-anchor text-center"
                  title="Valor Corrigido — este valor é o âncora; os demais se ajustam a ele">
                <i class="bi bi-pin-angle-fill text-primary"></i>
                <span class="d-none d-sm-inline ms-1 small">Corrigido</span>
              </th>
              <th class="col-profit text-end">Se ganhar</th>
            </tr>
          </thead>
          <tbody id="bets-body">
            <!-- rows injected by JS -->
          </tbody>
          <tfoot>
            <tr class="total-row" id="total-row">
              <td colspan="3" class="fw-semibold text-muted small align-middle ps-2">Total investido</td>
              <td>
                <input type="number" class="form-control form-control-sm calc-input"
                       id="total-stake-input" min="0" step="1" placeholder="0,00" />
              </td>
              <td></td>
              <td class="text-center">
                <input type="radio" class="anchor-radio form-check-input" name="anchor" value="total" />
              </td>
              <td></td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  </div>

  <!-- Profit section -->
  <div id="profit-section"></div>

  <!-- Execute operation -->
  <div id="calc-execute-wrap" class="mt-3 d-none">
    <div class="d-flex align-items-center gap-3 flex-wrap">
      <button class="btn btn-primary btn-sm" id="btn-calc-execute">
        <i class="bi bi-lightning-charge-fill me-1"></i>Executar Operação
      </button>
      <a href="/" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i>Ver contas
      </a>
    </div>
    <div id="calc-execute-status" class="mt-2 small"></div>
  </div>

</div>

<!-- Account picker portal (shared) -->
<div id="acc-picker-portal"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='calculator.js') }}"></script>
</body>
</html>
