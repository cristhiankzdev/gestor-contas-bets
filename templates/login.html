<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Gestor de Contas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      background: #f4f6f9;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border: 1px solid #e2e6ea;
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      padding: 36px 32px 28px;
      width: 100%;
      max-width: 380px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .login-logo i { font-size: 2rem; color: #22c55e; }
    .login-logo h1 { font-size: 1.2rem; font-weight: 700; color: #1a1a2e; margin: 6px 0 0; }
    .login-logo p  { font-size: 0.8rem; color: #9ca3af; margin: 2px 0 0; }
    .tab-btns {
      display: flex;
      background: #f4f6f9;
      border-radius: 8px;
      padding: 3px;
      margin-bottom: 20px;
    }
    .tab-btn {
      flex: 1;
      padding: 7px;
      font-size: 0.85rem;
      font-weight: 600;
      border: none;
      background: transparent;
      border-radius: 6px;
      color: #9ca3af;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .tab-btn.active {
      background: #fff;
      color: #1a1a2e;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .form-label { font-size: 0.82rem; font-weight: 600; color: #374151; }
    .btn-submit {
      width: 100%;
      padding: 10px;
      font-size: 0.92rem;
      font-weight: 700;
      border-radius: 8px;
      margin-top: 4px;
    }
    #error-msg {
      font-size: 0.82rem;
      border-radius: 8px;
      padding: 8px 12px;
      display: none;
    }
    #error-msg.show { display: block; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <i class="bi bi-people-fill"></i>
      <h1>Gestor de Contas</h1>
      <p>Gestão de operações</p>
    </div>

    <div class="tab-btns">
      <button class="tab-btn active" id="tab-login">Entrar</button>
      <button class="tab-btn" id="tab-register">Criar conta</button>
    </div>

    <div id="alert-msg" class="alert mb-3" role="alert" style="display:none"></div>

    <!-- LOGIN FORM -->
    <form id="form-login" autocomplete="on">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" id="login-email" placeholder="seu@email.com"
               autocomplete="email" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Senha</label>
        <input type="password" class="form-control" id="login-password" placeholder="••••••"
               autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn btn-success btn-submit">
        <i class="bi bi-box-arrow-in-right me-1"></i>Entrar
      </button>
    </form>

    <!-- REGISTER FORM -->
    <form id="form-register" autocomplete="on" style="display:none">
      <div class="mb-3">
        <label class="form-label">Nome</label>
        <input type="text" class="form-control" id="reg-name" placeholder="Seu nome"
               autocomplete="name" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" id="reg-email" placeholder="seu@email.com"
               autocomplete="email" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Senha <span class="text-muted fw-normal">(mín. 6 caracteres)</span></label>
        <input type="password" class="form-control" id="reg-password" placeholder="••••••"
               autocomplete="new-password" minlength="6" required />
      </div>
      <button type="submit" class="btn btn-success btn-submit">
        <i class="bi bi-person-plus me-1"></i>Criar conta
      </button>
    </form>
  </div>

  <script>
    const tabLogin    = document.getElementById("tab-login");
    const tabRegister = document.getElementById("tab-register");
    const formLogin   = document.getElementById("form-login");
    const formReg     = document.getElementById("form-register");
    const alertMsg    = document.getElementById("alert-msg");

    function showAlert(msg, type = "danger") {
      alertMsg.className = `alert alert-${type} mb-3`;
      alertMsg.textContent = msg;
      alertMsg.style.display = "block";
    }
    function hideAlert() { alertMsg.style.display = "none"; }

    tabLogin.addEventListener("click", () => {
      tabLogin.classList.add("active");
      tabRegister.classList.remove("active");
      formLogin.style.display = "";
      formReg.style.display = "none";
      hideAlert();
    });
    tabRegister.addEventListener("click", () => {
      tabRegister.classList.add("active");
      tabLogin.classList.remove("active");
      formReg.style.display = "";
      formLogin.style.display = "none";
      hideAlert();
    });

    formLogin.addEventListener("submit", async e => {
      e.preventDefault();
      hideAlert();
      const btn = formLogin.querySelector("button[type=submit]");
      btn.disabled = true;
      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email:    document.getElementById("login-email").value,
            password: document.getElementById("login-password").value,
          }),
        });
        const data = await res.json();
        if (res.ok) {
          console.log('[LOGIN] Login successful');
          window.location.href = "/";
        } else {
          console.error('[LOGIN] Login failed:', data.error);
          showAlert(data.error || "Erro ao entrar.");
        }
      } catch (err) {
        console.error('[LOGIN] Connection error:', err);
        showAlert("Erro de conexão. Verifique sua internet e tente novamente.");
      }
      finally { btn.disabled = false; }
    });

    formReg.addEventListener("submit", async e => {
      e.preventDefault();
      hideAlert();
      const btn = formReg.querySelector("button[type=submit]");
      btn.disabled = true;
      try {
        const res = await fetch("/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name:     document.getElementById("reg-name").value,
            email:    document.getElementById("reg-email").value,
            password: document.getElementById("reg-password").value,
          }),
        });
        const data = await res.json();
        if (res.status === 202) {
          console.log('[REGISTER] Account created, email confirmation needed');
          showAlert(data.error, "warning");
        }
        else if (res.ok) {
          console.log('[REGISTER] Registration successful');
          window.location.href = "/";
        } else {
          console.error('[REGISTER] Registration failed:', data.error);
          showAlert(data.error || "Erro ao criar conta.");
        }
      } catch (err) {
        console.error('[REGISTER] Connection error:', err);
        showAlert("Erro de conexão. Verifique sua internet e tente novamente.");
      }
      finally { btn.disabled = false; }
    });
  </script>
</body>
</html>
